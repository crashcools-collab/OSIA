:root {
  --paper: #0a0a16;
  --paper-2: #11111e;
  --paper-3: #1a1a2e;
  --ink: #ECEAF5;
  --ink-2: #c7c7da;
  --ink-3: #9595b0;
  --ink-4: #70708f;
  --acid: oklch(0.86 0.20 122);  /* electric lime */
  --acid-deep: oklch(0.66 0.20 122);
  --warn: oklch(0.72 0.18 35);
  --hairline: rgba(232,232,245,0.14);
  --hairline-strong: rgba(232,232,245,0.32);

  --display: "Instrument Serif", "Times New Roman", serif;
  --sans: "Inter Tight", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --mono: "JetBrains Mono", ui-monospace, monospace;

  --gutter: 32px;
  --row: 88px;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  background: var(--paper);
  color: var(--ink);
  font-size: 16px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "ss01", "cv11";
  font-variant-numeric: tabular-nums;
}

body[data-density="compact"] { --gutter: 20px; --row: 64px; }
body[data-density="airy"] { --gutter: 48px; --row: 120px; }

::selection { background: var(--acid); color: var(--ink); }

a { color: inherit; text-decoration: none; }
button { font-family: inherit; }

/* âââââââââ Layout âââââââââ */

.frame {
  max-width: 1480px;
  margin: 0 auto;
  padding: 0 var(--gutter);
}

.hairline { border: 0; border-top: 1px solid var(--hairline); margin: 0; }
.hairline-strong { border: 0; border-top: 1px solid var(--hairline-strong); margin: 0; }

.row { display: flex; align-items: center; gap: 16px; }
.spread { display: flex; align-items: center; justify-content: space-between; gap: 16px; }

.eyebrow {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-3);
}

.tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 4px 8px;
  background: transparent;
  border: 1px solid var(--hairline-strong);
  color: var(--ink-2);
}
.tag .dot { width: 6px; height: 6px; background: var(--acid-deep); border-radius: 50%; }
.tag.live .dot { background: var(--warn); animation: pulse 1.4s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: .35 } }

/* âââââââââ Top bar âââââââââ */
.topbar {
  position: sticky; top: 0; z-index: 50;
  background: var(--paper);
  border-bottom: 1px solid var(--hairline);
  backdrop-filter: saturate(140%) blur(8px);
}
.topbar .inner {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  height: 56px;
}
.wordmark {
  display: flex; align-items: baseline; gap: 10px;
  font-family: var(--display); font-size: 26px; line-height: 1;
}
.wordmark .crash { font-style: italic; }
.wordmark .dot {
  width: 7px; height: 7px; background: var(--acid-deep); border-radius: 50%;
  display: inline-block; transform: translateY(-3px);
}
.wordmark .id {
  font-family: var(--mono); font-size: 10px; color: var(--ink-3);
  letter-spacing: 0.08em;
}
.nav-links { display: flex; gap: 28px; justify-content: center; font-size: 13.5px; }
.nav-links a { position: relative; color: var(--ink-2); }
.nav-links a:hover { color: var(--ink); }
.nav-links a.active::after {
  content: ""; position: absolute; left: 0; right: 0; bottom: -19px; height: 2px; background: var(--ink);
}

.lang-toggle {
  display: inline-flex; border: 1px solid var(--hairline-strong); height: 28px;
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.05em;
}
.lang-toggle button {
  background: transparent; border: 0; padding: 0 10px; cursor: pointer; color: var(--ink-3);
}
.lang-toggle button.on { background: var(--ink); color: var(--paper); }

.btn {
  display: inline-flex; align-items: center; gap: 10px;
  height: 44px; padding: 0 18px; border: 1px solid var(--ink); background: var(--ink);
  color: var(--paper); font-size: 13.5px; cursor: pointer; font-family: inherit;
  transition: transform .12s ease;
}
.btn:hover { transform: translateY(-1px); }
.btn .arr { font-family: var(--mono); }
.btn.ghost { background: transparent; color: var(--ink); }
.btn.acid { background: var(--acid); border-color: var(--acid-deep); color: var(--ink); }
.btn.sm { height: 32px; padding: 0 12px; font-size: 12px; }

/* âââââââââ Hero âââââââââ */

.hero { padding: 60px 0 24px; position: relative; }
.hero h1 {
  font-family: var(--display);
  font-weight: 400;
  font-size: clamp(72px, 11vw, 184px);
  line-height: 0.86;
  letter-spacing: -0.025em;
  margin: 0;
}
.hero h1 em { font-style: italic; }
.hero h1 .acid-mark {
  background: var(--acid);
  padding: 0 0.08em;
}

.hero-grid {
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  gap: 64px;
  margin-top: 48px;
  align-items: end;
}
.hero-blurb { max-width: 560px; font-size: 18px; line-height: 1.5; color: var(--ink-2); }
.hero-blurb b { font-weight: 600; color: var(--ink); }

.hero-meta {
  display: grid;
  grid-template-columns: 1fr 1fr;
  border-top: 1px solid var(--hairline-strong);
  border-bottom: 1px solid var(--hairline-strong);
}
.hero-meta .cell {
  padding: 16px 0; padding-right: 16px;
  border-right: 1px solid var(--hairline);
}
.hero-meta .cell:last-child { border-right: 0; padding-left: 16px; padding-right: 0; }
.hero-meta .num {
  font-family: var(--display); font-size: 44px; line-height: 1; margin-top: 4px;
}

.hero-cta { display: flex; gap: 12px; margin-top: 28px; flex-wrap: wrap; }

.hero-bottombar {
  margin-top: 40px;
  padding: 14px 0;
  border-top: 1px solid var(--hairline);
  border-bottom: 1px solid var(--hairline);
  display: flex; justify-content: space-between; gap: 24px; align-items: center;
  font-family: var(--mono); font-size: 11px; color: var(--ink-3); letter-spacing: 0.06em;
  text-transform: uppercase;
}
.hero-bottombar .live-num { color: var(--ink); }

/* âââââââââ OSIA panel âââââââââ */

.aria-shell {
  margin-top: 48px;
  display: grid;
  grid-template-columns: 1fr 1.4fr;
  gap: 0;
  border: 1px solid var(--ink);
  background: var(--ink);
  color: var(--paper);
}
.aria-left { padding: 36px 32px; display: flex; flex-direction: column; justify-content: space-between; }
.aria-left h3 {
  font-family: var(--display); font-weight: 400; font-size: 56px; line-height: 0.95;
  margin: 0;
}
.aria-left .sub {
  margin-top: 14px; max-width: 320px; font-size: 14px; line-height: 1.5; color: rgba(242,239,232,0.65);
}
.aria-left .badge {
  font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--acid); display: inline-flex; align-items: center; gap: 8px;
}

.aria-right {
  background: #0F0F11;
  padding: 24px 28px;
  display: flex; flex-direction: column;
  min-height: 360px;
  border-left: 1px solid rgba(242,239,232,0.12);
}
.aria-right .head {
  display: flex; justify-content: space-between; align-items: center;
  font-family: var(--mono); font-size: 10.5px; color: rgba(242,239,232,0.45);
  letter-spacing: 0.08em; text-transform: uppercase;
  padding-bottom: 16px; border-bottom: 1px solid rgba(242,239,232,0.08);
}
.aria-msgs { flex: 1; padding: 18px 0; display: flex; flex-direction: column; gap: 14px; overflow: hidden; }
.aria-msg { max-width: 86%; font-size: 14.5px; line-height: 1.5; }
.aria-msg.user {
  align-self: flex-end; background: rgba(242,239,232,0.08); padding: 10px 14px;
  color: var(--paper);
}
.aria-msg.aria { color: rgba(242,239,232,0.92); padding-left: 0; position: relative; }
.aria-msg.aria::before {
  content: "OSIA"; font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em;
  color: var(--acid); display: block; margin-bottom: 4px;
}
.aria-msg.aria .pill-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
.aria-msg.aria .pill {
  font-family: var(--mono); font-size: 11px;
  padding: 4px 10px; border: 1px solid rgba(242,239,232,0.25);
  cursor: pointer; transition: background .15s;
}
.aria-msg.aria .pill:hover { background: var(--acid); color: var(--ink); border-color: var(--acid); }
.aria-msg.aria .typing-cursor {
  display: inline-block; width: 8px; height: 1em; background: var(--acid); vertical-align: -2px;
  margin-left: 1px; animation: blink 0.9s steps(1) infinite;
}
@keyframes blink { 50% { opacity: 0; } }

.aria-input {
  margin-top: auto;
  display: flex; gap: 0;
  border: 1px solid rgba(242,239,232,0.2);
}
.aria-input input {
  flex: 1; background: transparent; border: 0; outline: none; color: var(--paper);
  padding: 0 14px; font-family: inherit; font-size: 13.5px;
}
.aria-input button {
  background: var(--acid); color: var(--ink); border: 0; padding: 10px 18px; cursor: pointer;
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
}

/* âââââââââ Section header âââââââââ */
.section { padding: 80px 0 24px; }
.section-head {
  display: grid; grid-template-columns: auto 1fr auto; align-items: end; gap: 32px;
  padding-bottom: 24px; border-bottom: 1px solid var(--ink);
}
.section-head .num {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; color: var(--ink-3);
  align-self: start; padding-top: 8px;
}
.section-head h2 {
  font-family: var(--display); font-weight: 400; margin: 0;
  font-size: clamp(40px, 5vw, 72px); line-height: 0.95; letter-spacing: -0.02em;
}
.section-head h2 em { font-style: italic; }
.section-head .meta {
  font-family: var(--mono); font-size: 11px; color: var(--ink-3); letter-spacing: 0.06em;
  text-align: right; text-transform: uppercase;
}

/* âââââââââ Category carousel âââââââââ */
.carousel-wrap { position: relative; padding: 24px 0 8px; }
.carousel-track {
  display: flex; gap: 14px; overflow: hidden;
  scroll-behavior: smooth; padding-bottom: 12px;
  scroll-snap-type: x mandatory;
  cursor: grab;
}
.carousel-track::-webkit-scrollbar { display: none; }
.carousel-track.dragging { cursor: grabbing; }

.cat-card {
  flex: 0 0 320px; min-height: 220px;
  border: 1px solid var(--hairline-strong);
  background: var(--paper-2);
  padding: 18px 20px;
  display: flex; flex-direction: column; justify-content: space-between;
  cursor: pointer; transition: background .2s, border-color .2s, transform .2s;
  scroll-snap-align: start;
  position: relative;
  overflow: hidden;
}
.cat-card:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.cat-card:hover .cat-num, .cat-card:hover .cat-sub { color: rgba(242,239,232,0.65); }
.cat-card.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.cat-card.active .cat-num, .cat-card.active .cat-sub { color: rgba(242,239,232,0.65); }
.cat-card .cat-num { font-family: var(--mono); font-size: 11px; color: var(--ink-3); letter-spacing: 0.08em; }
.cat-card .cat-name {
  font-family: var(--display); font-size: 38px; line-height: 1; margin-top: 16px; letter-spacing: -0.01em;
}
.cat-card .cat-sub { font-size: 12.5px; color: var(--ink-3); margin-top: 8px; line-height: 1.4; }
.cat-card .cat-foot {
  display: flex; justify-content: space-between; align-items: end; margin-top: 18px;
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em;
}
.cat-card .cat-count { font-family: var(--display); font-size: 32px; line-height: 1; }

.carousel-nav { position: absolute; top: 24px; right: 0; display: flex; gap: 6px; }
.carousel-nav button {
  width: 36px; height: 36px; border: 1px solid var(--ink); background: var(--paper);
  font-family: var(--mono); cursor: pointer; font-size: 14px;
}
.carousel-nav button:hover { background: var(--ink); color: var(--paper); }

/* âââââââââ Filter bar âââââââââ */
.filter-bar {
  display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
  padding: 18px 0;
  border-bottom: 1px solid var(--hairline);
}
.filter-bar .label {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--ink-3); margin-right: 8px;
}
.chip {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.05em;
  padding: 6px 10px; border: 1px solid var(--hairline-strong); background: transparent;
  cursor: pointer; text-transform: uppercase;
  transition: all .15s;
}
.chip:hover { border-color: var(--ink); }
.chip.on { background: var(--ink); color: var(--paper); border-color: var(--ink); }

.sort-select {
  margin-left: auto; font-family: var(--mono); font-size: 11px; padding: 6px 10px;
  border: 1px solid var(--hairline-strong); background: transparent; text-transform: uppercase;
  color: var(--ink); letter-spacing: 0.05em; cursor: pointer;
}

/* âââââââââ Agent grid âââââââââ */
.agent-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  border-top: 1px solid var(--hairline);
}
body[data-density="compact"] .agent-grid { grid-template-columns: repeat(4, 1fr); }
body[data-density="airy"] .agent-grid { grid-template-columns: repeat(2, 1fr); }

.agent-card {
  border-right: 1px solid var(--hairline);
  border-bottom: 1px solid var(--hairline);
  padding: 22px 22px 18px;
  display: flex; flex-direction: column; gap: 14px;
  cursor: pointer;
  background: var(--paper);
  transition: background .15s;
  position: relative;
  min-height: 280px;
}
body[data-density="compact"] .agent-card { padding: 16px 16px 14px; min-height: 220px; gap: 10px; }
body[data-density="airy"] .agent-card { padding: 32px 32px 28px; min-height: 360px; gap: 18px; }

.agent-card:hover { background: var(--paper-2); }
.agent-card:hover .agent-preview { opacity: 1; transform: translateY(0); }

.agent-card .top {
  display: flex; justify-content: space-between; align-items: start;
  font-family: var(--mono); font-size: 10.5px; color: var(--ink-3); letter-spacing: 0.06em;
}
.agent-card .top .id { letter-spacing: 0.06em; }
.agent-card .top .rating { color: var(--ink); }
.agent-card .top .rating::before { content: "â "; color: var(--acid-deep); }

.agent-card h3 {
  font-family: var(--display); font-weight: 400; margin: 0;
  font-size: 38px; line-height: 0.95; letter-spacing: -0.01em;
}
body[data-density="compact"] .agent-card h3 { font-size: 30px; }
body[data-density="airy"] .agent-card h3 { font-size: 52px; }

.agent-card .role {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em;
  color: var(--ink-3); text-transform: uppercase;
}
.agent-card .blurb {
  font-size: 14px; line-height: 1.45; color: var(--ink-2);
  margin-top: -4px;
}
body[data-density="compact"] .agent-card .blurb { font-size: 13px; }

.agent-card .foot {
  margin-top: auto;
  display: flex; justify-content: space-between; align-items: end;
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em;
}
.agent-card .price {
  font-family: var(--display); font-size: 26px; line-height: 1; color: var(--ink);
}
.agent-card .price .unit { font-family: var(--mono); font-size: 10px; color: var(--ink-3); }
.agent-card .deploys { color: var(--ink-3); }

.agent-card .test-pill {
  position: absolute;
  top: 22px; right: 22px;
  display: none;
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--ink); background: var(--acid); padding: 3px 7px;
  border: 1px solid var(--acid-deep);
}
.agent-card:hover .test-pill { display: inline-block; }

/* âââââââââ Drawer âââââââââ */
.drawer-scrim {
  position: fixed; inset: 0; background: rgba(232,232,245,0.45);
  z-index: 80; opacity: 0; pointer-events: none; transition: opacity .25s;
}
.drawer-scrim.on { opacity: 1; pointer-events: auto; }
.drawer {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: min(720px, 100vw);
  background: var(--paper);
  z-index: 90;
  transform: translateX(100%); transition: transform .35s cubic-bezier(0.2, 0.8, 0.2, 1);
  display: flex; flex-direction: column;
  border-left: 1px solid var(--ink);
}
.drawer.on { transform: translateX(0); }
.drawer .top {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 24px; border-bottom: 1px solid var(--hairline-strong);
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--ink-3);
}
.drawer .top button {
  background: transparent; border: 1px solid var(--ink); padding: 4px 10px; cursor: pointer;
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.05em; color: var(--ink);
}
.drawer .body { overflow: auto; flex: 1; padding: 32px 24px; }
.drawer h2 {
  font-family: var(--display); font-weight: 400; margin: 0;
  font-size: clamp(48px, 6vw, 80px); line-height: 0.92; letter-spacing: -0.02em;
}
.drawer h2 em { font-style: italic; }
.drawer .role {
  font-family: var(--mono); font-size: 12px; letter-spacing: 0.05em; color: var(--ink-3);
  text-transform: uppercase; margin-top: 8px;
}
.drawer .quote {
  font-family: var(--display); font-style: italic; font-size: 28px; line-height: 1.2;
  margin: 28px 0 32px; color: var(--ink); padding-left: 16px;
  border-left: 2px solid var(--ink);
}

.drawer .stat-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  border-top: 1px solid var(--ink); border-bottom: 1px solid var(--hairline);
  margin-bottom: 32px;
}
.drawer .stat {
  padding: 14px 14px; border-right: 1px solid var(--hairline);
}
.drawer .stat:last-child { border-right: 0; }
.drawer .stat .k { font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-3); }
.drawer .stat .v { font-family: var(--display); font-size: 30px; line-height: 1; margin-top: 6px; }
.drawer .stat .u { font-family: var(--mono); font-size: 10px; color: var(--ink-3); }

/* Test drive */
.testdrive {
  border: 1px solid var(--ink);
  background: var(--paper);
  margin-bottom: 24px;
}
.testdrive .td-head {
  background: var(--ink); color: var(--paper);
  padding: 10px 14px;
  display: flex; justify-content: space-between; align-items: center;
  font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase;
}

// ───────────── Live counter ─────────────
function useLiveCounter(start, growMin = 1, growMax = 3, ms = 1800) {
  const [n, setN] = useState(start);
  useEffect(() => {
    const id = setInterval(() => {
      setN(v => v + Math.floor(Math.random() * (growMax - growMin + 1)) + growMin);
    }, ms);
    return () => clearInterval(id);
  }, [ms, growMin, growMax]);
  return n;
}

  const { useState: uS, useRef: uR, useEffect: uE } = React;
  const [msgs, setMsgs] = uS([{ who: "aria", text: hello }]);
  const [input, setInput] = uS(""); const [busy, setBusy] = uS(false);
  const bodyRef = uR(null);
  uE(() => { if (bodyRef.current) bodyRef.current.scrollTop = bodyRef.current.scrollHeight; }, [msgs, busy]);

      const reply = d.content || (d.error ? ("\u26a0\ufe0f " + d.error) : (lang === "fr" ? "Pas de reponse." : "No reply."));

// ───────────── Category carousel ─────────────
function CategoryCarousel({ lang, active, setActive }) {
  const t = T[lang];
  const trackRef = uR(null);

  const scrollBy = (dx) => {
    if (trackRef.current) trackRef.current.scrollBy({ left: dx, behavior: "smooth" });
  };

  // drag-to-scroll
  uE(() => {
    const el = trackRef.current; if (!el) return;
    let down = false, startX = 0, scrollL = 0;
    const onDown = (e) => { down = true; startX = e.pageX - el.offsetLeft; scrollL = el.scrollLeft; el.classList.add("dragging"); };
    const onMove = (e) => { if (!down) return; e.preventDefault(); el.scrollLeft = scrollL - (e.pageX - el.offsetLeft - startX); };
    const onUp = () => { down = false; el.classList.remove("dragging"); };
    el.addEventListener("mousedown", onDown);
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
    return () => { el.removeEventListener("mousedown", onDown); window.removeEventListener("mousemove", onMove); window.removeEventListener("mouseup", onUp); };
  }, []);

  return (
    <section id="categories" className="section frame">
      <div className="section-head">
        <div className="num">{t.sec1_label}</div>
        <h2>{t.sec1_title}</h2>

function AgentGrid({ lang, cat, sort, onSelect }) {

function TestDrive({ agent, lang }) {
  const sample = TD_SAMPLES[lang][agent.cat] || TD_SAMPLES[lang].architects;
  const [typed, setTyped] = uS("");
  const [phase, setPhase] = uS("idle"); // idle, typing, done
  uE(() => {
    setTyped(""); setPhase("typing");
    let i = 0;
    const id = setInterval(() => {
      i += 2;
      if (i > sample.out.length) { clearInterval(id); setPhase("done"); setTyped(sample.out); return; }
      setTyped(sample.out.slice(0, i));
    }, 14);
    return () => clearInterval(id);
  }, [agent.id, lang]);

  return (
    <div className="testdrive">
      <div className="td-head">
        <div className="left">
          <span className="acid">●</span>
          <span>{T[lang].td_head}</span>
        </div>
        <span>{agent.id} · {agent.name}</span>
      </div>
      <div className="td-body">
        <div className="td-input">{sample.in}</div>
        <div className="td-out">{typed}{phase === "typing" && <span className="blink"></span>}</div>
      </div>
      <div className="td-foot">
        <span>{T[lang].td_foot}</span>
        <span>{lang==="fr"?"Latence simulée 1.4s":"Simulated latency 1.4s"} · 247 tokens</span>
      </div>
    </div>
  );
}
